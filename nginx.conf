server {
    listen 80;
    server_name example.com www.example.com; # Ganti dengan nama domain Anda

    # Akses root untuk Frontend (Vite statis hasil build)
    root /var/www/kopi-tiang-alam/artifacts/kopi-tiang-alam/dist/public;
    index index.html;

    # Frontend Route (React Router fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Backend Reverse Proxy (Node.js API Server)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Melayani file asset terlampir jika diakses via route tertentu (opsional)
    location /assets/ {
        alias /var/www/kopi-tiang-alam/attached_assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
