# ============================================================================
# NGINX Configuration untuk Kopi Tiang Alam
# ============================================================================
# INSTRUKSI SETUP:
# 1. Ganti "example.com" dan "www.example.com" di bawah dengan domain Anda
#    Contoh: kopitiangalam.com, www.kopitiangalam.com
# 
# 2. Copy file ke /etc/nginx/sites-available/:
#    sudo cp nginx.conf /etc/nginx/sites-available/kopi-tiang-alam
#
# 3. Enable site:
#    sudo ln -s /etc/nginx/sites-available/kopi-tiang-alam /etc/nginx/sites-enabled/
#
# 4. Test konfigurasi:
#    sudo nginx -t
#
# 5. Restart Nginx:
#    sudo systemctl restart nginx
#
# 6. Setup SSL dengan Let's Encrypt (RECOMMENDED):
#    sudo certbot --nginx -d example.com -d www.example.com
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com; # 👈 GANTI DENGAN DOMAIN ANDA!

    # ========================================================================
    # Root directory untuk frontend (hasil build Vite)
    # ========================================================================
    root /var/www/kopi-tiang-alam/artifacts/kopi-tiang-alam/dist/public;
    index index.html;

    # ========================================================================
    # Frontend Routes (React Router - SPA fallback)
    # Semua request yang bukan file/folder akan diarahkan ke index.html
    # ========================================================================
    location / {
        try_files $uri $uri/ /index.html;
        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ========================================================================
    # API Backend Reverse Proxy
    # Forward semua /api/* request ke Node.js API Server di localhost:8080
    # ========================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        
        # HTTP version & upgrade support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Pass original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Bypass cache untuk upgrades
        proxy_cache_bypass $http_upgrade;
        
        # Security
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # ========================================================================
    # Static Assets (dengan caching)
    # ========================================================================
    location /assets/ {
        alias /var/www/kopi-tiang-alam/attached_assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ========================================================================
    # Cache untuk file statis frontend (CSS, JS, images)
    # ========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ========================================================================
    # Deny access ke file sensitif
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # Gzip compression untuk performance
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
}

